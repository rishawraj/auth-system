services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.server
      network: host
    command: ["node", "server/dist/server/scripts/migrate.js"]
    restart: "no"
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy


  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      network: host

    restart: unless-stopped
    ports:
      - "3000:3000"

    env_file:
      - .env.docker

    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.client
      network: host

    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - server

volumes:
  pgdata: